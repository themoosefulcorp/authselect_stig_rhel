---
- name: Gather minimum required facts
  ansible.builtin.setup:
    gather_subset:
      - '!all'
      - distribution
      - distribution_major_version
      - distribution_version
  when:
    - ansible_facts.distribution is not defined
      or ansible_facts.distribution_major_version is not defined
      or ansible_facts.distribution_version is not defined

- name: Assert that the current OS is either RHEL 8 or 9
  ansible.builtin.assert:
    that:
      - ansible_facts.distribution == 'RedHat'
      - ansible_facts.distribution_major_version in [ '8', '9' ]
    fail_msg: "This role has only been tested on RHEL 8 and 9"
  
- name: Fail if RHEL version is < 8.4
  ansible.builtin.fail:
    msg: "STIGs are applied differently on older versions of RHEL. Ain't nobody got time for that"
  when:
    - ansible_facts.distribution_major_version == '8'
    - ansible_facts.distribution_version is version('8.4', '<')

- name: Install prerequisite packages
  ansible.builtin.dnf:
    name:
      - authselect
      - sssd
    state: present

- name: List available authselect profiles
  ansible.builtin.command:
    cmd: authselect list
  register: __result_authselect_list
  changed_when: false

- name: Determine full profile name
  ansible.builtin.set_fact:
    __full_profile_name: "custom/{{ authselect_profile_name }}"

# you could be using authselect, but not have the custom profile created
- name: Include tasks to create a custom authselect profile
  ansible.builtin.include_tasks:
    file: create.yml
  when: __full_profile_name not in __result_authselect_list.stdout_lines

- name: Check if authselect is currently in use
  ansible.builtin.command:
    cmd: authselect current
  register: __result_authselect_current
  changed_when: false
  failed_when: false

- name: Parse the name of the currently used authselect profile
  ansible.builtin.set_fact:
    __current_profile_name: "{{ __result_authselect_current.stdout | regex_search('Profile ID: (\\S+)', '\\1') | default([], true) | first | default('', true) }}"
  when: __result_authselect_current.rc == 0

# a brand-new profile is inherently valid. skip straight to activation
- name: Include tasks to activate a newly created custom authselect profile
  ansible.builtin.include_tasks:
    file: activate.yml
  when: __custom_profile_created is defined

# classify the existing profile's state once, before any activation, so the two reconcile paths below are mutually exclusive.
- name: Record whether the custom profile is already the active one
  ansible.builtin.set_fact:
    __profile_already_active: "{{ __current_profile_name is defined and __current_profile_name == __full_profile_name }}"
  when: __custom_profile_created is not defined

# profile exists and is already active. validate and reconcile features.
- name: Include tasks to update an existing active custom authselect profile
  ansible.builtin.include_tasks:
    file: update.yml
  when:
    - __custom_profile_created is not defined
    - __profile_already_active | bool

# profile exists but isn't active. select it, then reconcile.
# activation makes it current, so update.yml's check and feature parse then operate on the correct (now-active) profile.
- name: Include tasks to activate an existing but inactive custom profile
  ansible.builtin.include_tasks:
    file: activate.yml
  when:
    - __custom_profile_created is not defined
    - not (__profile_already_active | bool)

- name: Reconcile features after activating a previously inactive profile
  ansible.builtin.include_tasks:
    file: update.yml
  when:
    - __custom_profile_created is not defined
    - not (__profile_already_active | bool)

- name: Populate system-auth file
  ansible.builtin.copy:
    src: "system-auth.el{{ ansible_facts.distribution_major_version }}"
    dest: "/etc/authselect/custom/{{ authselect_profile_name }}/system-auth"
  notify:
    - authselect_apply_changes
    - sssd_restart
  when: (role_path ~ '/files/system-auth.el' ~ ansible_facts.distribution_major_version) is exists

- name: Populate password-auth file
  ansible.builtin.copy:
    src: "password-auth.el{{ ansible_facts.distribution_major_version }}"
    dest: "/etc/authselect/custom/{{ authselect_profile_name }}/password-auth"
  notify:
    - authselect_apply_changes
    - sssd_restart
  when: (role_path ~ '/files/password-auth.el' ~ ansible_facts.distribution_major_version) is exists

- name: Populate smartcard-auth file
  ansible.builtin.copy:
    src: "smartcard-auth.el{{ ansible_facts.distribution_major_version }}"
    dest: "/etc/authselect/custom/{{ authselect_profile_name }}/smartcard-auth"
  notify:
    - authselect_apply_changes
    - sssd_restart
  when: (role_path ~ '/files/smartcard-auth.el' ~ ansible_facts.distribution_major_version) is exists

- name: Enable missing features
  ansible.builtin.command:
    cmd: authselect enable-feature {{ item }}
  loop: "{{ __features_to_enable }}"
  notify:
    - authselect_apply_changes
    - sssd_restart
  when:
    - __features_to_enable is defined
    - __features_to_enable | length > 0

- name: Remove unwanted features
  ansible.builtin.command:
    cmd: authselect disable-feature {{ item }}
  loop: "{{ __features_to_disable }}"
  notify:
    - authselect_apply_changes
    - sssd_restart
  when:
    - __features_to_disable is defined
    - __features_to_disable | length > 0

- name: Execute queued handlers
  ansible.builtin.meta: flush_handlers
  changed_when: false
...
